name: Publish Docker image

on:
  release:
    types: [published]

jobs:
  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # The Dockerfile reads .github/dependency-versions.json directly (jq) and
      # verifies each artifact's sha256, so no version-loading action is needed.
      # Surface any locked dependencies as a visible annotation on the run summary.
      - name: annotate locked dependencies
        shell: bash
        run: |
          jq -r 'to_entries[] | select(.value.locked == true)
                 | "::warning title=Locked dependency::\(.key) is locked at \(.value.version) and is not auto-updated"' \
            .github/dependency-versions.json
      - uses: diaspeiro/actions/container-build-push@3cf8e73d555d3fbde3dfee9596be3dc479fbbd0a
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          image-name: diaspeiro/medusa
